# ═══ OpenClaw — Agent Runtime (DeepSeek Function Calling) ═══
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: ccos
  labels:
    app.kubernetes.io/name: openclaw
    app.kubernetes.io/part-of: clawdcontext-os
    app.kubernetes.io/component: openclaw
    ccos/layer: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openclaw
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openclaw
        app.kubernetes.io/part-of: clawdcontext-os
        ccos/layer: agent
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: openclaw
          image: ghcr.io/yaamwebsolutions/ccos-openclaw:latest
          ports:
            - containerPort: 8403
              name: http
              protocol: TCP
          env:
            - name: AGENT_PROXY_URL
              value: http://agent-proxy:8400
            - name: FLIGHT_RECORDER_URL
              value: http://flight-recorder:8402
            - name: REPLAY_ENGINE_URL
              value: http://replay-engine:8404
            - name: MEMORY_SERVICE_URL
              value: http://memory-service:8405
            - name: CODE_RUNNER_URL
              value: http://code-runner:8406
            - name: WORKSPACE_DIR
              value: /workspace/agent
            - name: MODEL_NAME
              value: deepseek-chat
            - name: LOG_LEVEL
              value: info
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ccos-secrets
                  key: DEEPSEEK_API_KEY
            - name: DEEPSEEK_BASE_URL
              value: "https://api.deepseek.com"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ccos-secrets
                  key: OPENAI_API_KEY
                  optional: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: openclaw
  namespace: ccos
  labels:
    app.kubernetes.io/name: openclaw
    app.kubernetes.io/part-of: clawdcontext-os
spec:
  selector:
    app.kubernetes.io/name: openclaw
  ports:
    - port: 8403
      targetPort: http
      protocol: TCP
      name: http
  type: ClusterIP
