# ═══ ClawdContext OS — Kustomize Base ═══
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ccos

commonLabels:
  app.kubernetes.io/part-of: clawdcontext-os
  app.kubernetes.io/managed-by: kustomize

resources:
  - 00-namespace.yaml
  - 01-secrets.yaml
  - 02-configmap-nginx.yaml
  - 03-pvcs.yaml
  - 10-agent-proxy.yaml
  - 11-scanner-api.yaml
  - 12-flight-recorder.yaml
  - 13-openclaw.yaml
  - 14-replay-engine.yaml
  - 15-qdrant.yaml
  - 16-memory-service.yaml
  - 17-code-runner.yaml
  - 18-dashboard.yaml
  - 20-ingress.yaml
  - 21-networkpolicy.yaml

