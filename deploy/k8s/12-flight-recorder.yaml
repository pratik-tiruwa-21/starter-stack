# ═══ FlightRecorder — Layer 5 (Audit Log) ═══
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flight-recorder
  namespace: ccos
  labels:
    app.kubernetes.io/name: flight-recorder
    app.kubernetes.io/part-of: clawdcontext-os
    app.kubernetes.io/component: flight-recorder
    ccos/layer: "5"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: flight-recorder
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flight-recorder
        app.kubernetes.io/part-of: clawdcontext-os
        ccos/layer: "5"
    spec:
      terminationGracePeriodSeconds: 15
      containers:
        - name: flight-recorder
          image: ghcr.io/yaamwebsolutions/ccos-flight-recorder:latest
          ports:
            - containerPort: 8402
              name: http
              protocol: TCP
          env:
            - name: LOG_LEVEL
              value: info
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: flight-recorder
  namespace: ccos
  labels:
    app.kubernetes.io/name: flight-recorder
    app.kubernetes.io/part-of: clawdcontext-os
spec:
  selector:
    app.kubernetes.io/name: flight-recorder
  ports:
    - port: 8402
      targetPort: http
      protocol: TCP
      name: http
  type: ClusterIP
