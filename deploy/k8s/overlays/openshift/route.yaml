# ═══ ClawdContext OS — OpenShift Route ═══
# Replaces Kubernetes Ingress for OpenShift clusters.
# Automatically handles TLS via the cluster's router.
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: ccos-route
  namespace: ccos
  labels:
    app.kubernetes.io/part-of: clawdcontext-os
  annotations:
    # Enable WebSocket support
    haproxy.router.openshift.io/timeout: 300s
    haproxy.router.openshift.io/balance: roundrobin
spec:
  host: ccos.apps.example.com    # Replace with your OpenShift domain
  to:
    kind: Service
    name: dashboard
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
