# ═══ ReplayEngine — Layer 5→6 (Live Agent Replay) ═══
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: replay-engine
  namespace: ccos
  labels:
    app.kubernetes.io/name: replay-engine
    app.kubernetes.io/part-of: clawdcontext-os
    app.kubernetes.io/component: replay-engine
    ccos/layer: "5-6"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: replay-engine
  template:
    metadata:
      labels:
        app.kubernetes.io/name: replay-engine
        app.kubernetes.io/part-of: clawdcontext-os
        ccos/layer: "5-6"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      terminationGracePeriodSeconds: 15
      containers:
        - name: replay-engine
          image: ghcr.io/yaamwebsolutions/ccos-replay-engine:latest
          ports:
            - containerPort: 8404
              name: http
              protocol: TCP
          env:
            - name: FLIGHT_RECORDER_URL
              value: http://flight-recorder:8402
            - name: REPLAY_DATA_DIR
              value: /data
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: replay-data
---
apiVersion: v1
kind: Service
metadata:
  name: replay-engine
  namespace: ccos
  labels:
    app.kubernetes.io/name: replay-engine
    app.kubernetes.io/part-of: clawdcontext-os
spec:
  selector:
    app.kubernetes.io/name: replay-engine
  ports:
    - port: 8404
      targetPort: http
      protocol: TCP
      name: http
  type: ClusterIP
