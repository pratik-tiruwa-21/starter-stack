# ═══ ClawdContext OS — Secrets ═══
# IMPORTANT: Replace placeholder values with real base64-encoded secrets.
#   echo -n 'your-key' | base64
# Do NOT commit this file with real values — use sealed-secrets, SOPS, or Vault.
apiVersion: v1
kind: Secret
metadata:
  name: ccos-secrets
  namespace: ccos
  labels:
    app.kubernetes.io/part-of: clawdcontext-os
type: Opaque
data:
  # Required
  DEEPSEEK_API_KEY: "REPLACE_WITH_BASE64"        # echo -n 'sk-...' | base64
  # Optional — leave empty string (base64 of "") = ""
  OPENAI_API_KEY: ""
  # Notification channels (all optional)
  CCOS_NTFY_URL: ""
  CCOS_NTFY_TOPIC: ""
  CCOS_NTFY_TOKEN: ""
  CCOS_DISCORD_WEBHOOK: ""
  CCOS_TELEGRAM_BOT_TOKEN: ""
  CCOS_TELEGRAM_CHAT_ID: ""
  CCOS_SLACK_WEBHOOK: ""
  CCOS_MATRIX_HOMESERVER: ""
  CCOS_MATRIX_ROOM_ID: ""
  CCOS_MATRIX_ACCESS_TOKEN: ""
