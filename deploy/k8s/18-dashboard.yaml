# ═══ Dashboard — Mission Control (nginx reverse proxy) ═══
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: ccos
  labels:
    app.kubernetes.io/name: dashboard
    app.kubernetes.io/part-of: clawdcontext-os
    app.kubernetes.io/component: dashboard
    ccos/layer: "0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dashboard
        app.kubernetes.io/part-of: clawdcontext-os
        ccos/layer: "0"
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: dashboard
          image: ghcr.io/yaamwebsolutions/ccos-dashboard:latest
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          volumeMounts:
            # Override baked-in nginx.conf with K8s-specific config (kube-dns resolver)
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: nginx-conf
          configMap:
            name: dashboard-nginx-conf
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: ccos
  labels:
    app.kubernetes.io/name: dashboard
    app.kubernetes.io/part-of: clawdcontext-os
spec:
  selector:
    app.kubernetes.io/name: dashboard
  ports:
    - port: 3000
      targetPort: http
      protocol: TCP
      name: http
  type: ClusterIP
