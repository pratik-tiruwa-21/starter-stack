# ═══ Scanner API — Layer 1 (TTP Detection) ═══
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scanner-api
  namespace: ccos
  labels:
    app.kubernetes.io/name: scanner-api
    app.kubernetes.io/part-of: clawdcontext-os
    app.kubernetes.io/component: scanner-api
    ccos/layer: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: scanner-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scanner-api
        app.kubernetes.io/part-of: clawdcontext-os
        ccos/layer: "1"
    spec:
      terminationGracePeriodSeconds: 15
      containers:
        - name: scanner-api
          image: ghcr.io/yaamwebsolutions/ccos-scanner-api:latest
          ports:
            - containerPort: 8401
              name: http
              protocol: TCP
          env:
            - name: WORKSPACE_DIR
              value: /workspace
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: scanner-api
  namespace: ccos
  labels:
    app.kubernetes.io/name: scanner-api
    app.kubernetes.io/part-of: clawdcontext-os
spec:
  selector:
    app.kubernetes.io/name: scanner-api
  ports:
    - port: 8401
      targetPort: http
      protocol: TCP
      name: http
  type: ClusterIP
