# ═══ Memory Service — Semantic Memory Layer ═══
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: memory-service
  namespace: ccos
  labels:
    app.kubernetes.io/name: memory-service
    app.kubernetes.io/part-of: clawdcontext-os
    app.kubernetes.io/component: memory-service
    ccos/layer: memory
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: memory-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: memory-service
        app.kubernetes.io/part-of: clawdcontext-os
        ccos/layer: memory
    spec:
      terminationGracePeriodSeconds: 15
      containers:
        - name: memory-service
          image: ghcr.io/yaamwebsolutions/ccos-memory-service:latest
          ports:
            - containerPort: 8405
              name: http
              protocol: TCP
          env:
            - name: QDRANT_URL
              value: http://qdrant:6333
            - name: FLIGHT_RECORDER_URL
              value: http://flight-recorder:8402
            - name: EMBEDDING_MODEL
              value: all-MiniLM-L6-v2
            - name: AUTO_INGEST
              value: "true"
            - name: HF_HUB_DISABLE_TELEMETRY
              value: "1"
            - name: TRANSFORMERS_OFFLINE
              value: "1"
            - name: TOKENIZERS_PARALLELISM
              value: "false"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: memory-service
  namespace: ccos
  labels:
    app.kubernetes.io/name: memory-service
    app.kubernetes.io/part-of: clawdcontext-os
spec:
  selector:
    app.kubernetes.io/name: memory-service
  ports:
    - port: 8405
      targetPort: http
      protocol: TCP
      name: http
  type: ClusterIP
