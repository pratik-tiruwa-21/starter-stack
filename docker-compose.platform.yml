# ClawdContext OS — Platform Services
# Real running microservices: AgentProxy, Scanner, FlightRecorder, Dashboard
#
# Usage:
#   docker compose -f docker-compose.platform.yml up -d --build
#   docker compose -f docker-compose.platform.yml logs -f
#   docker compose -f docker-compose.platform.yml down
#
# Full stack (platform + observability):
#   docker compose -f docker-compose.platform.yml -f docker-compose.yaml up -d --build

services:

  # ═══ Layer 4: AgentProxy (Reference Monitor) — Go ═══
  agent-proxy:
    build: ./platform/agent-proxy-go
    container_name: ccos-agent-proxy
    ports:
      - "8400:8400"
    environment:
      - SKILLS_DIR=/workspace/agent/skills
      - PROXY_PORT=8400
      - MAX_RATE_RPM=120
      - CER_WARN=0.4
      - CER_CRIT=0.2
      - AUDIT_FILE=/data/audit/chain.jsonl
      # Notification channels (all optional — leave empty to disable)
      - CCOS_NTFY_URL=${CCOS_NTFY_URL:-}
      - CCOS_NTFY_TOPIC=${CCOS_NTFY_TOPIC:-}
      - CCOS_NTFY_TOKEN=${CCOS_NTFY_TOKEN:-}
      - CCOS_DISCORD_WEBHOOK=${CCOS_DISCORD_WEBHOOK:-}
      - CCOS_TELEGRAM_BOT_TOKEN=${CCOS_TELEGRAM_BOT_TOKEN:-}
      - CCOS_TELEGRAM_CHAT_ID=${CCOS_TELEGRAM_CHAT_ID:-}
      - CCOS_SLACK_WEBHOOK=${CCOS_SLACK_WEBHOOK:-}
      - CCOS_MATRIX_HOMESERVER=${CCOS_MATRIX_HOMESERVER:-}
      - CCOS_MATRIX_ROOM_ID=${CCOS_MATRIX_ROOM_ID:-}
      - CCOS_MATRIX_ACCESS_TOKEN=${CCOS_MATRIX_ACCESS_TOKEN:-}
      - CCOS_HITL_TIMEOUT=${CCOS_HITL_TIMEOUT:-300}
      - CCOS_PROXY_PUBLIC_URL=${CCOS_PROXY_PUBLIC_URL:-http://localhost:8400}
    volumes:
      - ./agent/skills:/workspace/agent/skills:ro
      - proxy-audit:/data/audit
    networks:
      - platform-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8400/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    labels:
      com.clawdcontext.layer: "4"
      com.clawdcontext.component: "agent-proxy"
      com.clawdcontext.runtime: "go"

  # ═══ Layer 1: Scanner API (TTP Detection) ═══
  scanner-api:
    build: ./platform/scanner-api
    container_name: ccos-scanner-api
    ports:
      - "8401:8401"
    environment:
      - WORKSPACE_DIR=/workspace
    volumes:
      - ./agent:/workspace/agent:ro
    networks:
      - platform-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8401/healthz')"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    labels:
      com.clawdcontext.layer: "1"
      com.clawdcontext.component: "scanner-api"

  # ═══ Layer 5: FlightRecorder (Audit Log) ═══
  flight-recorder:
    build: ./platform/flight-recorder
    container_name: ccos-flight-recorder
    ports:
      - "8402:8402"
    environment:
      - LOG_LEVEL=info
    networks:
      - platform-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8402/healthz')"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    labels:
      com.clawdcontext.layer: "5"
      com.clawdcontext.component: "flight-recorder"

  # ═══ OpenClaw Agent Runtime ═══
  openclaw:
    build: ./platform/openclaw
    container_name: ccos-openclaw
    ports:
      - "8403:8403"
    environment:
      - AGENT_PROXY_URL=http://agent-proxy:8400
      - FLIGHT_RECORDER_URL=http://flight-recorder:8402
      - REPLAY_ENGINE_URL=http://replay-engine:8404
      - MEMORY_SERVICE_URL=http://memory-service:8405
      - WORKSPACE_DIR=/workspace/agent
      - LLM_PROVIDER=${LLM_PROVIDER:-deepseek}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - MODEL_NAME=${DEEPSEEK_MODEL:-deepseek-chat}
      - LOG_LEVEL=info
    volumes:
      - ./agent:/workspace/agent:ro
    depends_on:
      agent-proxy:
        condition: service_healthy
      flight-recorder:
        condition: service_healthy
      replay-engine:
        condition: service_healthy
      memory-service:
        condition: service_healthy
    networks:
      - platform-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8403/healthz')"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    labels:
      com.clawdcontext.layer: "agent"
      com.clawdcontext.component: "openclaw"

  # ═══ Layer 5→6: ReplayEngine (Live Agent Replay) ═══
  replay-engine:
    build: ./platform/replay-engine
    container_name: ccos-replay-engine
    ports:
      - "8404:8404"
    environment:
      - FLIGHT_RECORDER_URL=http://flight-recorder:8402
      - REPLAY_DATA_DIR=/data
    volumes:
      - replay-data:/data
    depends_on:
      flight-recorder:
        condition: service_healthy
    networks:
      - platform-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8404/healthz')"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    labels:
      com.clawdcontext.layer: "5-6"
      com.clawdcontext.component: "replay-engine"

  # ═══ Qdrant Vector Database ═══
  qdrant:
    image: qdrant/qdrant:v1.12.6
    container_name: ccos-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - platform-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/0.0.0.0/6333' || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    labels:
      com.clawdcontext.layer: "memory"
      com.clawdcontext.component: "qdrant"

  # ═══ Memory Service (Semantic Memory Layer) ═══
  memory-service:
    build: ./platform/memory-service
    container_name: ccos-memory-service
    ports:
      - "8405:8405"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - FLIGHT_RECORDER_URL=http://flight-recorder:8402
      - EMBEDDING_MODEL=all-MiniLM-L6-v2
      - AUTO_INGEST=true
    depends_on:
      qdrant:
        condition: service_healthy
    networks:
      - platform-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8405/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      com.clawdcontext.layer: "memory"
      com.clawdcontext.component: "memory-service"

  # ═══ Dashboard (Mission Control) ═══
  dashboard:
    build: ./platform/dashboard
    container_name: ccos-dashboard
    ports:
      - "3000:3000"
    depends_on:
      agent-proxy:
        condition: service_healthy
      scanner-api:
        condition: service_healthy
      flight-recorder:
        condition: service_healthy
      openclaw:
        condition: service_healthy
      replay-engine:
        condition: service_healthy
    networks:
      - platform-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s
    labels:
      com.clawdcontext.layer: "0"
      com.clawdcontext.component: "dashboard"

volumes:
  replay-data:
  proxy-audit:
  qdrant-data:

networks:
  platform-net:
    driver: bridge