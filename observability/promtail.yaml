server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: ccos-agent-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: ccos-agent
          __path__: /var/log/ccos/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            component: component
            layer: layer
      - labels:
          level:
          component:
          layer:
