# Prometheus scrape configuration for ClawdContext OS

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'ccos-agent-metrics'
    static_configs:
      - targets: ['host.docker.internal:9091']
        labels:
          layer: '1'
          component: 'scanner'
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'ccos-proxy-metrics'
    static_configs:
      - targets: ['host.docker.internal:9092']
        labels:
          layer: '4'
          component: 'agent-proxy'
    metrics_path: '/metrics'
    scrape_interval: 5s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
