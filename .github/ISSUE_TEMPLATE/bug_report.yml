name: "Bug Report"
description: "Report a bug in the ClawdContext OS starter stack"
title: "[BUG] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please fill in the details below.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the stack is affected?
      options:
        - "Scanner (ccos-scan)"
        - "CER Calculator (ccos-cer)"
        - "Signing (ccos-sign)"
        - "Audit (ccos-audit)"
        - "Security Policies (OPA/Rego)"
        - "Sandbox (Docker)"
        - "Observability (Prometheus/Grafana/Loki)"
        - "Red-Team Tests"
        - "Agent Kernel (CLAUDE.md/AGENTS.md)"
        - "Makefile / Build"
        - "Other"
    validations:
      required: true

  - type: dropdown
    id: layer
    attributes:
      label: Security Layer
      description: Which layer does this affect?
      options:
        - "Layer 1 — Design Time (Scanner)"
        - "Layer 2 — Supply Chain (ClawdSign)"
        - "Layer 3 — Deploy Time (Sandbox)"
        - "Layer 4 — Runtime (AgentProxy)"
        - "Layer 5 — Observability (FlightRecorder)"
        - "Layer 6 — Recovery (SnapshotEngine)"
        - "Cross-layer / Unknown"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug
      placeholder: "When I run `make scan`, the scanner reports..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      value: |
        1. Clone the repo
        2. Run `make setup`
        3. Run `...`
        4. See error
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "macOS 15, Ubuntu 24.04, etc."

  - type: input
    id: docker
    attributes:
      label: Docker Version
      placeholder: "Docker 27.x, Podman 5.x, etc."

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any error output
      render: shell
