name: "Feature Request"
description: "Propose a new feature or improvement"
title: "[FEAT] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Help us build the future of agent security. Describe your idea below.

  - type: dropdown
    id: lane
    attributes:
      label: Contributor Lane
      description: Which lane does this feature belong to?
      options:
        - "Agent Builders — New skills or kernel improvements"
        - "Security Researchers — Detection patterns, policies, sandbox"
        - "Platform Engineers — Runtime layers (AgentProxy, FlightRecorder, etc.)"
        - "Observability Engineers — Dashboards, alerts, metrics"
        - "Documentation & Education"
    validations:
      required: true

  - type: dropdown
    id: layer
    attributes:
      label: Target Layer
      options:
        - "Layer 1 — Design Time (Scanner)"
        - "Layer 2 — Supply Chain (ClawdSign)"
        - "Layer 3 — Deploy Time (Sandbox)"
        - "Layer 4 — Runtime (AgentProxy)"
        - "Layer 5 — Observability (FlightRecorder)"
        - "Layer 6 — Recovery (SnapshotEngine)"
        - "Cross-layer"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this solve?
      placeholder: "Currently there's no way to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should it work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider?

  - type: dropdown
    id: breaking
    attributes:
      label: Breaking Change?
      options:
        - "No"
        - "Yes — requires migration"
        - "Unsure"
    validations:
      required: true
