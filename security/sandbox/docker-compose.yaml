# ClawdContext OS — Agent Sandbox
# Layer 3: Docker-based isolation for agent execution
#
# Usage: docker compose -f security/sandbox/docker-compose.yaml up
#
# Security features:
#   - Non-root user (UID 1000)
#   - Read-only root filesystem
#   - No network by default
#   - Seccomp strict profile
#   - No new privileges
#   - Memory + CPU limits
#   - Tmpfs for /tmp (no persistent scratch)

services:
  agent-sandbox:
    image: python:3.12-slim
    container_name: ccos-agent-sandbox
    user: "1000:1000"

    # Read-only root filesystem
    read_only: true

    # Writable workspace volume (only /workspace/output)
    volumes:
      - ../../agent:/workspace/agent:ro          # Agent files (read-only)
      - agent-output:/workspace/output            # Output directory (writable)

    # Temporary filesystem for /tmp
    tmpfs:
      - /tmp:size=64M,noexec,nosuid

    # No network access by default
    network_mode: "none"

    # Security options
    security_opt:
      - no-new-privileges:true
      - seccomp=seccomp-strict.json

    # Capabilities: drop ALL, add NONE
    cap_drop:
      - ALL

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

    # No privileged mode
    privileged: false

    # Environment
    environment:
      - WORKSPACE=/workspace
      - AGENT_DIR=/workspace/agent
      - OUTPUT_DIR=/workspace/output
      - CCOS_SANDBOX=true
      - CCOS_VERSION=1.0.0
      # NEVER pass real credentials here
      # - OPENAI_API_KEY    ← DO NOT DO THIS
      # - AWS_SECRET_KEY    ← DO NOT DO THIS

    # Health check
    healthcheck:
      test: ["CMD-SHELL", "test -f /workspace/agent/CLAUDE.md"]
      interval: 30s
      timeout: 5s
      retries: 3

    # Working directory
    working_dir: /workspace

    # Default command: interactive shell (override for specific tasks)
    command: ["python3", "-c", "print('ClawdContext OS Sandbox Ready'); import time; time.sleep(3600)"]

    # Restart policy
    restart: unless-stopped

    # Labels
    labels:
      com.clawdcontext.layer: "3"
      com.clawdcontext.component: "sandbox"
      com.clawdcontext.version: "1.0.0"

  # Network-enabled sandbox (for skills with net: capabilities)
  agent-sandbox-net:
    image: python:3.12-slim
    container_name: ccos-agent-sandbox-net
    user: "1000:1000"
    read_only: true
    profiles:
      - network  # Only starts with: docker compose --profile network up

    volumes:
      - ../../agent:/workspace/agent:ro
      - agent-output:/workspace/output

    tmpfs:
      - /tmp:size=64M,noexec,nosuid

    # Restricted network (only allowed endpoints)
    networks:
      - agent-net

    security_opt:
      - no-new-privileges:true
      - seccomp=seccomp-strict.json

    cap_drop:
      - ALL

    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

    privileged: false
    working_dir: /workspace

    command: ["python3", "-c", "print('ClawdContext OS Network Sandbox Ready'); import time; time.sleep(3600)"]

    labels:
      com.clawdcontext.layer: "3"
      com.clawdcontext.component: "sandbox-net"

volumes:
  agent-output:
    driver: local

networks:
  agent-net:
    driver: bridge
    internal: false  # Allow outbound (filtered by network-policy.yaml)
    ipam:
      config:
        - subnet: 172.28.0.0/16
