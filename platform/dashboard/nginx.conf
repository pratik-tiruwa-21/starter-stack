server {
    listen 3000;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 256;

    # Dashboard static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy to AgentProxy
    location /api/proxy/ {
        proxy_pass http://agent-proxy:8400/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
    }

    # Reverse proxy to Scanner API
    location /api/scanner/ {
        proxy_pass http://scanner-api:8401/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
    }

    # Reverse proxy to FlightRecorder
    location /api/recorder/ {
        proxy_pass http://flight-recorder:8402/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
    }

    # WebSocket proxy for AgentProxy events
    location /ws/proxy/ {
        proxy_pass http://agent-proxy:8400/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # WebSocket proxy for FlightRecorder events
    location /ws/recorder/ {
        proxy_pass http://flight-recorder:8402/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Reverse proxy to OpenClaw agent runtime
    location /api/openclaw/ {
        proxy_pass http://openclaw:8403/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_read_timeout 120;
    }

    # WebSocket proxy for OpenClaw events
    location /ws/openclaw/ {
        proxy_pass http://openclaw:8403/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # WebSocket proxy for OpenClaw terminal
    location /ws/terminal/ {
        proxy_pass http://openclaw:8403/ws/terminal;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Grafana reverse proxy (optional — only works when observability stack is running)
    # Returns 502 with JSON body when grafana container is not present
    location /grafana/ {
        error_log /var/log/nginx/error.log crit;
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $grafana_upstream http://host.docker.internal:3001;
        proxy_pass $grafana_upstream;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_intercept_errors on;
        error_page 502 = @grafana_unavailable;
    }
    location @grafana_unavailable {
        default_type application/json;
        return 503 '{"status":"unavailable","message":"Grafana is not running. Start the observability stack to enable dashboards."}';
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
