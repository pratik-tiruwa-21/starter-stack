# ═══════════════════════════════════════════════════════════════════
# ClawdContext OS — Dashboard Reverse Proxy (Production-Grade)
# ═══════════════════════════════════════════════════════════════════
# All microservice traffic flows through this nginx instance.
# Works with Docker Compose, Kubernetes, and OpenShift.
#
# Upstream hostnames are resolved dynamically via resolver directive.
# In K8s/OpenShift, replace 127.0.0.11 with kube-dns (e.g., 10.96.0.10)
# or use the NGINX_RESOLVER env var with envsubst in the entrypoint.
# ═══════════════════════════════════════════════════════════════════

# Connection tuning
proxy_buffers 16 16k;
proxy_buffer_size 16k;
proxy_busy_buffers_size 32k;

# Shared rate-limit zones (applied per location)
limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api_chat:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=api_scan:10m rate=10r/s;

# ─── Upstream map (environment-overridable via envsubst) ───
# Default hostnames match docker-compose service names.
# For K8s: set env vars → UPSTREAM_PROXY=http://agent-proxy.ccos:8400, etc.
map $host $upstream_proxy_host {
    default http://agent-proxy:8400;
}
map $host $upstream_scanner_host {
    default http://scanner-api:8401;
}
map $host $upstream_recorder_host {
    default http://flight-recorder:8402;
}
map $host $upstream_openclaw_host {
    default http://openclaw:8403;
}
map $host $upstream_replay_host {
    default http://replay-engine:8404;
}
map $host $upstream_memory_host {
    default http://memory-service:8405;
}
map $host $upstream_coderunner_host {
    default http://code-runner:8406;
}

server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker DNS: 127.0.0.11 | K8s: kube-dns (10.96.0.10 or coredns)
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ─── Compression ───
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_types text/plain text/css application/javascript application/json
               application/xml text/xml image/svg+xml;
    gzip_min_length 256;

    # ─── Logging ───
    access_log /var/log/nginx/access.log combined buffer=16k flush=5s;
    error_log  /var/log/nginx/error.log warn;

    # ─── Security Headers (all responses) ───
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' ws: wss:; frame-src 'self' blob:; font-src 'self' data:;" always;

    # ─── Nginx Health Endpoint (for K8s readiness/liveness probes) ───
    location = /healthz {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok","service":"dashboard"}';
    }

    location = /readyz {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ready","service":"dashboard"}';
    }

    # ─── Dashboard Static Files ───
    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # ═══════════════════════════════════════════════════════════════
    # HTTP Reverse Proxies — dynamic DNS via set $upstream
    # ═══════════════════════════════════════════════════════════════

    # ─── AgentProxy (Layer 4) ───
    location /api/proxy/ {
        limit_req zone=api_general burst=20 nodelay;

        set $upstream_proxy http://agent-proxy:8400;
        rewrite ^/api/proxy/(.*) /$1 break;
        proxy_pass $upstream_proxy;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_http_version 1.1;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
    }

    # ─── Scanner API (Layer 1) ───
    location /api/scanner/ {
        limit_req zone=api_scan burst=10 nodelay;

        set $upstream_scanner http://scanner-api:8401;
        rewrite ^/api/scanner/(.*) /$1 break;
        proxy_pass $upstream_scanner;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_http_version 1.1;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 10s;
    }

    # ─── FlightRecorder (Layer 5) ───
    location /api/recorder/ {
        limit_req zone=api_general burst=20 nodelay;

        set $upstream_recorder http://flight-recorder:8402;
        rewrite ^/api/recorder/(.*) /$1 break;
        proxy_pass $upstream_recorder;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_http_version 1.1;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
    }

    # ─── OpenClaw Agent Runtime ───
    location /api/openclaw/ {
        limit_req zone=api_chat burst=5 nodelay;

        set $upstream_openclaw http://openclaw:8403;
        rewrite ^/api/openclaw/(.*) /$1 break;
        proxy_pass $upstream_openclaw;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_http_version 1.1;
        proxy_connect_timeout 10s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ─── Sandbox Preview (code output iframes) ───
    location /api/v1/sandbox/ {
        set $upstream_sandbox http://openclaw:8403;
        proxy_pass $upstream_sandbox$request_uri;

        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id;
        proxy_http_version 1.1;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;

        # Isolate preview content
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval' blob: data:;" always;
    }

    # ─── ReplayEngine (Layer 5→6) ───
    location /api/replay/ {
        limit_req zone=api_general burst=20 nodelay;

        set $upstream_replay http://replay-engine:8404;
        rewrite ^/api/replay/(.*) /$1 break;
        proxy_pass $upstream_replay;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_http_version 1.1;
        proxy_connect_timeout 5s;
        proxy_read_timeout 120s;
        proxy_send_timeout 10s;
    }

    # ─── Memory Service ───
    location /api/memory/ {
        limit_req zone=api_general burst=20 nodelay;

        set $upstream_memory http://memory-service:8405;
        rewrite ^/api/memory/(.*) /$1 break;
        proxy_pass $upstream_memory;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_http_version 1.1;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
    }

    # ─── Code Runner (internal, no direct UI access) ───
    location /api/runner/ {
        limit_req zone=api_chat burst=5 nodelay;

        set $upstream_runner http://code-runner:8406;
        rewrite ^/api/runner/(.*) /$1 break;
        proxy_pass $upstream_runner;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_http_version 1.1;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 10s;
    }

    # ═══════════════════════════════════════════════════════════════
    # WebSocket Proxies
    # ═══════════════════════════════════════════════════════════════

    # ─── AgentProxy Events ───
    location /ws/proxy/ {
        set $upstream_ws_proxy http://agent-proxy:8400;
        rewrite ^/ws/proxy/(.*) /ws/$1 break;
        proxy_pass $upstream_ws_proxy;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ─── FlightRecorder Events ───
    location /ws/recorder/ {
        set $upstream_ws_recorder http://flight-recorder:8402;
        rewrite ^/ws/recorder/(.*) /ws/$1 break;
        proxy_pass $upstream_ws_recorder;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ─── OpenClaw Events ───
    location /ws/openclaw/ {
        set $upstream_ws_openclaw http://openclaw:8403;
        rewrite ^/ws/openclaw/(.*) /ws/$1 break;
        proxy_pass $upstream_ws_openclaw;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ─── OpenClaw Terminal ───
    location /ws/terminal/ {
        set $upstream_ws_terminal http://openclaw:8403;
        proxy_pass $upstream_ws_terminal/ws/terminal;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ─── ReplayEngine Live Timeline ───
    location /ws/replay/ {
        set $upstream_ws_replay http://replay-engine:8404;
        proxy_pass $upstream_ws_replay/ws/replay;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ═══════════════════════════════════════════════════════════════
    # Optional Services
    # ═══════════════════════════════════════════════════════════════

    # ─── Grafana (observability stack) ───
    location /grafana/ {
        error_log /var/log/nginx/error.log crit;
        set $grafana_upstream http://host.docker.internal:3001;
        proxy_pass $grafana_upstream;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_intercept_errors on;
        error_page 502 = @grafana_unavailable;
    }
    location @grafana_unavailable {
        default_type application/json;
        return 503 '{"status":"unavailable","message":"Grafana is not running. Start the observability stack."}';
    }

    # ─── Catch-all for undefined API routes ───
    # MUST be a prefix match (not regex ~) — regex would override all /api/* prefix locations
    location /api/ {
        default_type application/json;
        return 404 '{"error":"not_found","message":"No upstream service matches this route"}';
    }
}
